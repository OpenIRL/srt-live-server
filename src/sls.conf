srt { # SRT
    worker_threads 1;
    worker_connections 200;
		
    http_port 8080;
    cors_header *;

    log_file /dev/stdout;
    log_level info;
        
    # Endpoint configuration file
    endpoint_config endpoints.json;
    
    # Authentication for endpoint management
    endpoint_auth {
        username admin;
        password your_secure_password;  # Consider using hashed passwords in production
        token_secret your_jwt_secret;   # Secret for JWT token generation
        token_expire 3600;              # Token expiration in seconds
    }
        
    # Server configuration
    ingest_port 4000;  # Port for ingest connections
    outgest_port 4001; # Port for outgest connections

    latency 20; # unit ms in milliseconds
    backlog 100; # accept connections at the same time
    idle_streams_timeout 10; # s -1: unlimited
    
    # Recording settings
    record_hls off; # on, off 
    record_hls_segment_duration 10; # unit s
    
    # Optional event notification
    # on_event_url http://127.0.0.1:8000/sls/on_event; #?method=on_connect|on_close&role_name=&srt_url=%s
    
    # Optional relay configuration
    # relay_pull {
    #     mode loop; # loop; hash;
    #     reconnect_interval 10;
    #     idle_streams_timeout -1; # s -1: unlimited
    #     upstreams 127.0.0.1:9090?streamid=live.sls.com/live 192.168.1.100:8080/?streamid=live.test.com/live;
    # }
    # relay_push {
    #     mode all; # all; hash
    #     reconnect_interval 10;
    #     idle_streams_timeout 10; # s -1: unlimited
    #     upstreams srt://10.201.30.10:8080/?streamid=uplive.sls/live/{stream_name};
    # }
}



